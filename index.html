<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dino Run 🦕</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --bg: #f7f3e9;
      --dino: #535353;
      --text: #535353;
      --accent: #e05c2a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      user-select: none;
      transition: background 1s;
    }

    body.night { --bg: #1a1a2e; --text: #e0e0e0; background: #1a1a2e; }

    h1 {
      font-size: clamp(12px, 2.5vw, 20px);
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: 3px;
    }

    #score-board {
      width: min(800px, 95vw);
      display: flex;
      justify-content: space-between;
      font-size: clamp(7px, 1.3vw, 12px);
      color: var(--text);
      margin-bottom: 6px;
      padding: 0 4px;
    }

    #hi-val   { color: var(--accent); }

    canvas {
      display: block;
      image-rendering: pixelated;
      border: 3px solid var(--dino);
      border-radius: 4px;
      width: min(800px, 95vw);
      transition: border-color 1s;
    }

    body.night canvas { border-color: #555; }

    #message {
      margin-top: 14px;
      font-size: clamp(7px, 1.3vw, 11px);
      color: var(--text);
      text-align: center;
      line-height: 2.2;
    }
    #message span { color: var(--accent); }
  </style>
</head>
<body>
<h1>🦕 DINO RUN</h1>
<div id="score-board">
  <span>HI <span id="hi-val">00000</span></span>
  <span>SCORE <span id="score-val">00000</span></span>
</div>
<canvas id="c"></canvas>
<div id="message">
  PRESS <span>SPACE / ↑</span> OR <span>TAP</span> TO START &nbsp;|&nbsp; DUCK: <span>↓</span>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const msgEl  = document.getElementById('message');
const scoreEl= document.getElementById('score-val');
const hiEl   = document.getElementById('hi-val');

const W = 800, H = 200;
canvas.width = W; canvas.height = H;

const GROUND_Y = 155;
const GRAVITY  = 0.55;
const JUMP_V   = -13;

/* ---------- Palette ---------- */
const DAY   = { bg:'#f7f3e9', ground:'#757575', dino:'#535353', obs:'#535353', bird:'#535353', cloud:'#cccccc' };
const NIGHT = { bg:'#1a1a2e', ground:'#aaaaaa', dino:'#e0e0e0', obs:'#e0e0e0', bird:'#9ac8e8', cloud:'#2a2a4a' };
let P = {};
Object.assign(P, DAY);
let nightCycle = 0, nightOn = false, nightTimer = 0;

function hexRgb(h) {
  if (h.startsWith('rgb')) { const m=h.match(/\d+/g); return {r:+m[0],g:+m[1],b:+m[2]}; }
  h = h.replace('#','');
  if (h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  const v=parseInt(h,16);
  return {r:(v>>16)&255,g:(v>>8)&255,b:v&255};
}
function lerpColor(a,b,t){
  const A=hexRgb(a),B=hexRgb(b);
  return `rgb(${Math.round(A.r+(B.r-A.r)*t)},${Math.round(A.g+(B.g-A.g)*t)},${Math.round(A.b+(B.b-A.b)*t)})`;
}

/* ---------- State ---------- */
let state='idle', score=0, hiScore=0, frame=0, speed=5, speedInc=0;
let obstacles=[], nextObs=80, clouds=[], cloudTimer=70;
let stars=[];
for(let i=0;i<70;i++) stars.push({x:Math.random()*W,y:10+Math.random()*(GROUND_Y-30),s:Math.random()<0.3?2:1});
let groundPebbles=[];
for(let i=0;i<40;i++) groundPebbles.push({x:Math.random()*W, y:GROUND_Y+55+Math.random()*12, w:2+Math.floor(Math.random()*4), h:2});

/* ---------- Dino ---------- */
const dino = {x:75,y:GROUND_Y,w:42,h:52,vy:0,onGround:true,ducking:false,leg:0,legT:0,dead:false};

/* ---------- Pixel-art Dino renderer ---------- */
function drawDino(x, y, ducking, leg, col, dead) {
  const c = col;
  const W2 = ducking ? '#f7f3e9' : col; // unused eye bg
  ctx.fillStyle = c;

  if (!ducking) {
    // Tail
    ctx.fillRect(x,      y+30,  8,  8);
    ctx.fillRect(x+2,    y+34,  6,  8);
    // Body
    ctx.fillRect(x+6,    y+10,  32, 36);
    ctx.fillRect(x+4,    y+14,  36, 28);
    // Neck / Head
    ctx.fillRect(x+18,   y,     24, 30);
    // Snout
    ctx.fillRect(x+38,   y+8,   12,  8);
    ctx.fillRect(x+42,   y+8,    8,  4);
    // Eye
    ctx.fillStyle = dead ? c : '#f7f3e9';
    ctx.fillRect(x+26,   y+6,    8,  8);
    if (!dead) { ctx.fillStyle='#535353'; ctx.fillRect(x+28, y+8, 4, 4); }
    ctx.fillStyle = c;
    // Arm
    ctx.fillRect(x+14,   y+28,   8,  6);
    // Legs
    if (leg===0) {
      ctx.fillRect(x+16, y+46,  8, 14); ctx.fillRect(x+14, y+56, 10, 4);
      ctx.fillRect(x+28, y+42,  8, 10); ctx.fillRect(x+26, y+48, 10, 4);
    } else if (leg===1) {
      ctx.fillRect(x+14, y+42,  8, 10); ctx.fillRect(x+12, y+48, 10, 4);
      ctx.fillRect(x+28, y+46,  8, 14); ctx.fillRect(x+26, y+56, 10, 4);
    } else {
      ctx.fillRect(x+16, y+44,  8, 12); ctx.fillRect(x+14, y+52, 10, 4);
      ctx.fillRect(x+28, y+44,  8, 12); ctx.fillRect(x+26, y+52, 10, 4);
    }
    // Dead X eye
    if (dead) {
      ctx.fillStyle='#ffffff';
      ctx.fillRect(x+26,y+8,4,2); ctx.fillRect(x+30,y+8,4,2);
      ctx.fillRect(x+28,y+6,4,2); ctx.fillRect(x+28,y+10,4,2);
    }
  } else {
    // Ducking form
    ctx.fillRect(x+2,    y+24,  54,  4);
    ctx.fillRect(x+6,    y+18,  46, 12);
    ctx.fillRect(x+14,   y+12,  30,  8);
    // Head
    ctx.fillRect(x+38,   y+2,   22, 22);
    ctx.fillRect(x+56,   y+6,    8,  6);
    ctx.fillRect(x+60,   y+6,    4,  2);
    // Eye
    ctx.fillStyle = dead ? c : '#f7f3e9';
    ctx.fillRect(x+46,   y+6,    6,  6);
    if (!dead) { ctx.fillStyle='#535353'; ctx.fillRect(x+48, y+8, 2, 2); }
    ctx.fillStyle = c;
    // Duck legs
    const lx = leg===0 ? 6 : 14;
    ctx.fillRect(x+lx,      y+30,  8, 8); ctx.fillRect(x+lx+4,   y+34, 6, 4);
    ctx.fillRect(x+lx+18,   y+30,  8, 8); ctx.fillRect(x+lx+22,  y+34, 6, 4);
  }
}

/* ---------- Obstacles ---------- */
const CACTI = [
  // type A – single tall
  [[6,0,8,54],[0,16,20,8],[20,10,10,14]],
  // type B – cluster 2
  [[4,8,8,48],[0,20,18,8],[18,16,8,18],[24,4,8,52],[20,18,18,8]],
  // type C – wide base
  [[0,8,8,48],[8,8,8,48],[2,2,12,10],[0,22,18,8],[8,22,18,8]],
];

function drawCactus(o) {
  ctx.fillStyle = P.obs;
  const tpl = CACTI[o.v % 3];
  for (const [dx,dy,dw,dh] of tpl) ctx.fillRect(o.x+dx, o.y-o.h+dy, dw, dh);
}

function cactusHitbox(o) {
  // tight hitbox
  return {x:o.x+4, y:o.y-o.h+2, w:(o.v===1?40:18)-8, h:o.h-2};
}

function drawBird(o) {
  const x=o.x, y=o.y, c=P.bird;
  ctx.fillStyle=c;
  ctx.fillRect(x+8, y+8,  24,12);
  ctx.fillRect(x+4, y+10, 32, 8);
  ctx.fillRect(x+30,y+8,   8, 6);
  ctx.fillRect(x+36,y+10,  4, 2);
  ctx.fillRect(x+32,y+6,   4, 4);
  // Wings
  if (o.wing) {
    ctx.fillRect(x,    y,    14,10);
    ctx.fillRect(x+24, y,    16,10);
  } else {
    ctx.fillRect(x+2,  y+16, 12,10);
    ctx.fillRect(x+26, y+16, 14,10);
  }
  ctx.fillStyle='#ffffff';
  ctx.fillRect(x+36,y+10,2,2);
}

/* ---------- Cloud ---------- */
function drawCloud(x,y,w) {
  ctx.fillStyle = P.cloud;
  ctx.beginPath();
  ctx.ellipse(x+w*0.25, y+10, w*0.25, 10, 0, 0, Math.PI*2);
  ctx.ellipse(x+w*0.52, y+6,  w*0.22, 14, 0, 0, Math.PI*2);
  ctx.ellipse(x+w*0.78, y+10, w*0.20, 10, 0, 0, Math.PI*2);
  ctx.rect(x, y+8, w, 12);
  ctx.fill();
}

/* ---------- Audio ---------- */
let ac;
function getAC() { if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)(); return ac; }
function beep(f,d,v=0.12){
  try{const a=getAC(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.frequency.value=f;
  g.gain.setValueAtTime(v,a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);
  o.start();o.stop(a.currentTime+d);}catch(e){}
}
const playJump=()=>beep(540,0.1);
const playDie =()=>{beep(180,0.3,0.2);setTimeout(()=>beep(140,0.3,0.15),100);};
const playMile=()=>{beep(880,0.05);setTimeout(()=>beep(1100,0.07),80);};

/* ---------- Input ---------- */
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();
  if(e.code==='Space'||e.code==='ArrowUp') onAction();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
canvas.addEventListener('pointerdown',()=>onAction());

function onAction(){
  if(state==='idle'||state==='dead'){startGame();return;}
  if(dino.onGround&&!dino.ducking){dino.vy=JUMP_V;dino.onGround=false;playJump();}
}

/* ---------- Game control ---------- */
function startGame(){
  state='running'; score=0; frame=0; speed=5; speedInc=0;
  obstacles=[]; nextObs=80; clouds=[]; cloudTimer=40;
  nightCycle=0; nightOn=false; nightTimer=0;
  Object.assign(P, DAY); document.body.classList.remove('night');
  Object.assign(dino,{y:GROUND_Y,vy:0,onGround:true,ducking:false,leg:0,legT:0,dead:false});
  msgEl.style.display='none';
}

function die(){
  state='dead'; dino.dead=true;
  if(score>hiScore){hiScore=score;}
  hiEl.textContent=fmt(hiScore); playDie();
  msgEl.innerHTML='GAME OVER &nbsp;—&nbsp; PRESS <span>SPACE / ↑</span> OR <span>TAP</span> TO RESTART';
  msgEl.style.display='block';
}

const fmt=n=>String(Math.floor(n)).padStart(5,'0');

/* ---------- Update ---------- */
function update(){
  frame++;
  score += 0.1*(speed/5);
  speedInc++;
  if(speedInc>100){speed=Math.min(speed+0.15,16);speedInc=0;}

  // Score display + milestone
  const sc=Math.floor(score);
  scoreEl.textContent=fmt(score);
  if(sc>0 && sc%100===0 && frame%6===0) playMile();

  // Night cycle
  nightTimer += speed;
  if(nightTimer > 3500){ nightTimer=0; nightOn=!nightOn; }
  const tgt = nightOn?1:0;
  nightCycle += (tgt-nightCycle)*0.008;
  if(nightCycle>0.5) document.body.classList.add('night');
  else document.body.classList.remove('night');
  for(const k of Object.keys(DAY)) P[k]=lerpColor(DAY[k],NIGHT[k],nightCycle);

  // Dino
  dino.ducking = !!(keys['ArrowDown']||keys['ControlLeft']);
  if(dino.ducking){ dino.h=32; dino.w=58; }
  else            { dino.h=52; dino.w=42; }
  const groundY = dino.ducking ? GROUND_Y+20 : GROUND_Y;
  if(!dino.onGround){ dino.vy+=GRAVITY; dino.y+=dino.vy; if(dino.y>=groundY){dino.y=groundY;dino.vy=0;dino.onGround=true;} }
  else { dino.y=groundY; }

  // Leg anim
  if(dino.onGround){ dino.legT++; if(dino.legT>Math.max(3,9-Math.floor(speed/2))){dino.leg=(dino.leg+1)%3;dino.legT=0;} }
  else { dino.leg=2; }

  // Obstacles
  nextObs--;
  if(nextObs<=0){
    const isBird = score>250 && Math.random()<0.28;
    if(isBird){
      const heights=[GROUND_Y-55,GROUND_Y-85,GROUND_Y-25];
      obstacles.push({type:'bird',x:W+10,y:heights[Math.floor(Math.random()*heights.length)],w:44,h:28,wing:0,wT:0});
    } else {
      const v=Math.floor(Math.random()*3);
      const h=40+Math.random()*22;
      obstacles.push({type:'cactus',x:W+10,y:GROUND_Y+52,h,v,w:v===1?46:22});
    }
    nextObs = 55+Math.random()*(80-score/80);
  }

  for(const o of obstacles){
    o.x -= speed;
    if(o.type==='bird'){
      o.wT++; if(o.wT>8){o.wing=1-o.wing;o.wT=0;}
      o.y += Math.sin(frame*0.05)*0.3;
      // Hitbox
      if(collides(dino,o.x+6,o.y+6,o.w-12,o.h-12)){die();return;}
    } else {
      const hb=cactusHitbox(o);
      if(collides(dino,hb.x,hb.y,hb.w,hb.h)){die();return;}
    }
  }
  obstacles=obstacles.filter(o=>o.x>-120);

  // Clouds
  cloudTimer--;
  if(cloudTimer<=0){clouds.push({x:W+10,y:15+Math.random()*55,w:50+Math.random()*80});cloudTimer=70+Math.random()*60;}
  clouds.forEach(c=>c.x-=speed*0.25);
  clouds=clouds.filter(c=>c.x>-200);

  // Ground pebbles
  groundPebbles.forEach(p=>{p.x-=speed;if(p.x<-6)p.x=W+4;});
}

function collides(a,bx,by,bw,bh){
  const p=5;
  return a.x+p<bx+bw && a.x+a.w-p>bx && a.y+p<by+bh && a.y+a.h-p>by;
}

/* ---------- Draw ---------- */
function draw(){
  ctx.fillStyle=P.bg;
  ctx.fillRect(0,0,W,H);

  // Stars
  if(nightCycle>0.05){
    ctx.globalAlpha=nightCycle;
    ctx.fillStyle='#ffffff';
    for(const s of stars) ctx.fillRect(s.x,s.y,s.s,s.s);
    ctx.globalAlpha=1;
  }

  // Clouds
  for(const c of clouds) drawCloud(c.x,c.y,c.w);

  // Ground
  ctx.fillStyle=P.ground;
  ctx.fillRect(0,GROUND_Y+52,W,3);
  for(const p of groundPebbles){ctx.fillStyle=P.ground;ctx.fillRect(p.x,p.y,p.w,p.h);}

  // Obstacles
  for(const o of obstacles){
    if(o.type==='cactus') drawCactus(o);
    else drawBird(o);
  }

  // Dino
  drawDino(dino.x, dino.y, dino.ducking, dino.dead?2:dino.leg, P.dino, dino.dead);

  // Idle decoration cactus
  if(state==='idle'){
    ctx.fillStyle=P.obs;
    ctx.fillRect(460,GROUND_Y+8,10,44); ctx.fillRect(456,GROUND_Y+24,18,8);
    ctx.fillRect(472,GROUND_Y+14,10,38); ctx.fillRect(468,GROUND_Y+28,18,8);
    ctx.fillRect(490,GROUND_Y+16,10,36); ctx.fillRect(486,GROUND_Y+30,18,8);
  }
}

/* ---------- Loop ---------- */
function loop(){
  if(state==='running') update();
  draw();
  requestAnimationFrame(loop);
}

msgEl.style.display='block';
// Init clouds for idle
clouds=[{x:180,y:35,w:90},{x:430,y:55,w:70},{x:660,y:28,w:110}];
loop();
</script>
</body>
</html>
