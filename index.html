<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dino Run Remastered v26.2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div id="menu-main" class="overlay">
            <h1>🦕 DINO RUN</h1>
            <div class="btn-group">
                <button onclick="game.start('single')">SINGLEPLAYER</button>
                <button onclick="ui.show('multi')">MULTIPLAYER</button>
                <button onclick="ui.show('settings')">SETTINGS</button>
                <button onclick="ui.show('updates')">UPDATES</button>
            </div>
        </div>

        <div id="menu-multi" class="overlay hidden">
            <h2>MULTIPLAYER</h2>
            <div class="btn-group">
                <button onclick="game.start('local')">LOCAL (P1: ↑, P2: W)</button>
                <button class="disabled">ONLINE (SOON)</button>
                <button class="back" onclick="ui.show('main')">BACK</button>
            </div>
        </div>

        <div id="menu-settings" class="overlay hidden">
            <h2>SETTINGS</h2>
            <div class="btn-group">
                <button id="toggle-sound" onclick="game.toggleSound()">SOUND: ON</button>
                <button id="toggle-fx" onclick="game.toggleFX()">EFFECTS: ON</button>
                <p class="credits">CREDITS: Advait S & 8370 Creations</p>
                <button class="back" onclick="ui.show('main')">BACK</button>
            </div>
        </div>

        <div id="menu-updates" class="overlay hidden">
            <h2>LOG v26.2</h2>
            <div class="scroll-box">
                <p><span>v26.2:</span> Real Pixel Sprites, Fixed Scaling, New Controls.</p>
                <p><span>v26.1:</span> Bug fixes for high-score saving.</p>
                <p><span>v26.0:</span> Menu System & Local Multiplayer.</p>
            </div>
            <button class="back" onclick="ui.show('main')">BACK</button>
        </div>

        <div id="game-stats" class="hidden">
            <div id="score-box">HI <span id="hi-val">00000</span> | <span id="score-val">00000</span></div>
        </div>

        <div id="game-over" class="overlay hidden">
            <h2 id="winner-text">GAME OVER</h2>
            <div class="btn-group">
                <button onclick="game.restart()">RETRY</button>
                <button onclick="ui.show('main')">MENU</button>
            </div>
        </div>
    </div>

    <canvas id="c"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
