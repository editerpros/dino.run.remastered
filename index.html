<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dino Run Remastered 🦕</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="menu-overlay" class="overlay">
        <h1>🦕 DINO RUN</h1>
        <div class="menu-options">
            <button onclick="showScreen('singleplayer')">SINGLE PLAYER</button>
            <button onclick="showScreen('multiplayer')">MULTIPLAYER</button>
            <button onclick="showScreen('settings')">SETTINGS</button>
            <button onclick="showScreen('updates')">UPDATES</button>
        </div>
    </div>

    <div id="multiplayer-menu" class="overlay hidden">
        <h2>MULTIPLAYER</h2>
        <button onclick="startLocalMP()">LOCAL (P1: ↑, P2: W)</button>
        <button onclick="alert('Online Server Coming Soon!')">ONLINE</button>
        <button class="back-btn" onclick="showScreen('main')">BACK</button>
    </div>

    <div id="settings-menu" class="overlay hidden">
        <h2>SETTINGS</h2>
        <div class="setting-item">SOUND: <button id="toggle-sound" onclick="toggleSound()">ON</button></div>
        <div class="setting-item">EFFECTS: <button id="toggle-fx" onclick="toggleFX()">ON</button></div>
        <div class="setting-item" style="margin-top:20px; font-size: 10px;">CREDITS: Created by Gemini AI</div>
        <button class="back-btn" onclick="showScreen('main')">BACK</button>
    </div>

    <div id="updates-menu" class="overlay hidden">
        <h2>UPDATES (v2.0)</h2>
        <div class="scroll-box">
            <p><span>v2.0:</span> Added Menu System, Local MP, and UI Overhaul.</p>
            <p><span>v1.5:</span> Added Night cycle & Birds.</p>
            <p><span>v1.0:</span> Initial Release.</p>
        </div>
        <button class="back-btn" onclick="showScreen('main')">BACK</button>
    </div>

    <div id="score-board" class="hidden">
        <span>HI <span id="hi-val">00000</span></span>
        <span>SCORE <span id="score-val">00000</span></span>
    </div>

    <canvas id="c"></canvas>

    <div id="game-over" class="overlay hidden">
        <h2 id="winner-msg">GAME OVER</h2>
        <button onclick="returnToMenu()">MAIN MENU</button>
        <button onclick="restartCurrentMode()">RETRY</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
