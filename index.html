<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QVKVE9QYBY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-QVKVE9QYBY');
    </script>

    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
    <link rel="icon" href="favicon.svg" type="image/svg+xml" sizes="any">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dino Run Remastered v26.5 🦕</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div id="menu-main" class="overlay">
            <h1>🦕 DINO RUN REMASTERED</h1>
            <input type="text" id="nick-input" placeholder="ENTER NICKNAME" maxlength="10">
            <div class="btn-group">
                <button onclick="game.start('single')">SINGLEPLAYER</button>
                <button onclick="ui.show('multi')">MULTIPLAYER</button>
                <button onclick="ui.show('leaderboard')">GLOBAL SCORES</button>
                <button onclick="ui.show('settings')">SETTINGS</button>
            </div>
        </div>

        <div id="menu-leaderboard" class="overlay hidden">
            <h2>TOP 10 WORLDWIDE</h2>
            <div id="leaderboard-list" class="scroll-box">Loading...</div>
            <button class="back" onclick="ui.show('main')">BACK</button>
        </div>

        <div id="menu-multi" class="overlay hidden">
            <h2>MULTIPLAYER</h2>
            <div class="btn-group">
                <button onclick="game.start('local')">LOCAL (P1: ↑, P2: W)</button>
                <button onclick="ui.show('online-lobby')">ONLINE MULTIPLAYER</button>
                <button class="back" onclick="ui.show('main')">BACK</button>
            </div>
        </div>

        <div id="menu-online-lobby" class="overlay hidden">
            <h2>ONLINE LOBBY</h2>
            <div class="btn-group">
                <input type="text" id="room-input" placeholder="ENTER ROOM ID">
                <button onclick="online.join()">JOIN ROOM</button>
                <hr>
                <label>MAX PLAYERS: <input type="number" id="max-p" value="5" min="2" max="10"></label>
                <button onclick="online.create()">CREATE ROOM</button>
                <button class="back" onclick="ui.show('multi')">BACK</button>
            </div>
        </div>

        <div id="menu-settings" class="overlay hidden">
            <h2>SETTINGS</h2>
            <div class="btn-group">
                <button onclick="Sound.toggle()">SOUND: ON</button>
                <p class="credits">CREDITS: Advait8370</p>
                <button class="back" onclick="ui.show('main')">BACK</button>
            </div>
        </div>

        <div id="game-stats" class="hidden">
            <div id="biome-tag">DESERT</div>
            <div id="score-box">HI <span id="hi-val">00000</span> | <span id="score-val">00000</span></div>
        </div>

        <div id="game-over" class="overlay hidden">
            <h2 id="winner-text">GAME OVER</h2>
            <div class="btn-group">
                <button onclick="game.restart()">RETRY</button>
                <button onclick="ui.show('main')">MENU</button>
            </div>
        </div>
    </div>
    <canvas id="c"></canvas>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>
</body>
</html>
